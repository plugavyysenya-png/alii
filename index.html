<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Aliya</title>
    <style>
        /* Elegant fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Container for hand-drawn hearts */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        /* Hand-drawn heart */
        .hand-drawn-heart {
            position: absolute;
            width: 30px;
            height: 30px;
            opacity: 0;
            animation: elegantFall 7s cubic-bezier(0.25, 0.1, 0.2, 1) forwards;
        }
        
        .hand-drawn-heart svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }
        
        .hand-drawn-heart path {
            stroke: #ffffff;
            stroke-width: 1.2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        @keyframes elegantFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
                transform: translateY(0vh) rotate(20deg) scale(0.6);
            }
            30% {
                transform: translateY(20vh) rotate(40deg) scale(0.8);
            }
            50% {
                transform: translateY(40vh) rotate(60deg) scale(1);
            }
            70% {
                transform: translateY(60vh) rotate(80deg) scale(0.8);
            }
            90% {
                transform: translateY(80vh) rotate(100deg) scale(0.5);
                opacity: 0.4;
            }
            100% {
                transform: translateY(110vh) rotate(120deg) scale(0.2);
                opacity: 0;
            }
        }
        
        /* Main container with glass effect */
        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            width: 90%;
            max-width: 700px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 30px rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 2;
            border-radius: 4px;
            animation: containerAppear 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* Elegant photo frame */
        .image-frame {
            margin: 0 auto 40px;
            max-width: 400px;
            padding: 8px;
            background: linear-gradient(145deg, #4a4a4a, #2a2a2a);
            box-shadow: 
                0 20px 40px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            position: relative;
            animation: frameAppear 1s ease-out 0.3s both;
            transition: box-shadow 0.6s ease;
        }
        
        .image-frame::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            animation: borderPulse 4s ease-in-out infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(255, 255, 255, 0.3); }
            50% { border-color: rgba(255, 255, 255, 0.6); }
        }
        
        @keyframes frameAppear {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .image-frame img {
            display: block;
            width: 100%;
            height: auto;
            filter: grayscale(80%) contrast(1.1);
            transition: opacity 0.6s ease;
            opacity: 0.95;
        }
        
        /* Elegant question in English */
        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 300;
            color: #1a1a1a;
            margin: 30px 0 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            animation: textReveal 1.2s ease-out 0.5s both;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        .question-text::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a4a4a, transparent);
            animation: lineExpand 1.5s ease-out 1.2s forwards;
        }
        
        @keyframes textReveal {
            0% {
                opacity: 0;
                letter-spacing: 20px;
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                letter-spacing: 4px;
                filter: blur(0);
            }
        }
        
        @keyframes lineExpand {
            0% { width: 0; opacity: 0; }
            100% { width: 100px; opacity: 1; }
        }
        
        /* Buttons container */
        .buttons-container {
            position: relative;
            height: 140px;
            margin: 50px 0 30px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: rgba(245, 245, 245, 0.7);
            border-radius: 2px;
            animation: buttonsAppear 1s ease-out 0.8s both;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        @keyframes buttonsAppear {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Stylish buttons */
        .btn {
            padding: 18px 50px;
            font-size: 1.8rem;
            border: none;
            background: transparent;
            color: #1a1a1a;
            cursor: pointer;
            font-weight: 400;
            position: absolute;
            min-width: 140px;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid #1a1a1a;
            z-index: 10;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        
        .btn-yes {
            left: 10%;
            bottom: 30px;
            background: transparent;
            transition: all 0.3s ease;
            z-index: 20;
        }
        
        .btn-yes.grown {
            background: #1a1a1a;
            color: #ffffff;
            z-index: 30;
        }
        
        .btn-yes:active {
            transform: scale(0.95);
        }
        
        .btn-no {
            right: 10%;
            bottom: 30px;
            background: transparent;
            transition: left 0.15s ease, top 0.15s ease, right 0.15s ease, bottom 0.15s ease;
            z-index: 10;
        }
        
        /* Love you message */
        .love-message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 30px;
            opacity: 0;
            animation: loveAppear 1.5s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            line-height: 1.2;
        }
        
        @keyframes loveAppear {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
        
        /* Subtle line */
        .subtle-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a4a4a, transparent);
            margin: 20px auto;
            animation: widthPulse 3s ease-in-out infinite;
        }
        
        @keyframes widthPulse {
            0%, 100% { width: 50px; opacity: 0.3; }
            50% { width: 100px; opacity: 0.6; }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .question-text {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            
            .love-message {
                font-size: 2.8rem;
                letter-spacing: 4px;
            }
            
            .btn {
                padding: 12px 30px;
                font-size: 1.4rem;
                min-width: 100px;
                letter-spacing: 2px;
            }
            
            .btn-yes { left: 5%; }
            .btn-no { right: 5%; }
            
            .container {
                padding: 30px 20px;
            }
            
            .buttons-container {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div id="hearts-container"></div>
    
    <div class="container" id="mainContainer">
        <!-- Photo frame -->
        <div class="image-frame" id="imageFrame">
            <img id="mainImage" src="photo1.jpg" alt="Photo">
        </div>
        
        <!-- Question in English -->
        <div class="question-text" id="questionText">
            Aliya, will you be my girlfriend?
        </div>
        
        <div class="subtle-line"></div>
        
        <!-- Buttons container -->
        <div class="buttons-container" id="buttonsContainer">
            <button class="btn btn-yes" id="yesBtn">YES</button>
            <button class="btn btn-no" id="noBtn">NO</button>
        </div>
        
        <!-- Love you message (initially hidden) -->
        <div id="loveMessage" style="display: none;"></div>
    </div>

    <script>
        // Game state
        let gameState = {
            firstYesClicked: false,
            noClicked: false,
            yesGrowCount: 0,
            yesEnabled: false
        };
        
        // DOM elements
        const heartsContainer = document.getElementById('hearts-container');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');
        const mainImage = document.getElementById('mainImage');
        const buttonsContainer = document.getElementById('buttonsContainer');
        const imageFrame = document.getElementById('imageFrame');
        const loveMessage = document.getElementById('loveMessage');
        
        // SVG path for hand-drawn heart
        const heartPath = 'M12 4.248c-3.148-5.402-12-3.825-12 2.944 0 4.661 5.571 9.427 12 15.808 6.429-6.381 12-11.147 12-15.808 0-6.792-8.875-8.306-12-2.944z';
        
        // Check if YES button covers NO button
        function doesYesCoverNo() {
            const yesRect = yesBtn.getBoundingClientRect();
            const noRect = noBtn.getBoundingClientRect();
            const containerRect = buttonsContainer.getBoundingClientRect();
            
            // Adjust coordinates relative to container
            const yesLeft = yesRect.left - containerRect.left;
            const yesRight = yesRect.right - containerRect.left;
            const noLeft = noRect.left - containerRect.left;
            const noRight = noRect.right - containerRect.left;
            
            // Check if YES overlaps NO horizontally
            const horizontalOverlap = (yesLeft <= noRight && yesRight >= noLeft);
            
            // YES button grows, so it will eventually cover NO
            return horizontalOverlap && gameState.yesGrowCount >= 8; // Need enough growth
        }
        
        // Function to create hand-drawn hearts
        function createHandDrawnHeart() {
            const heart = document.createElement('div');
            heart.className = 'hand-drawn-heart';
            
            const size = Math.random() * 40 + 20;
            heart.style.width = size + 'px';
            heart.style.height = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            
            const duration = Math.random() * 4 + 6;
            heart.style.animationDuration = duration + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", heartPath);
            path.setAttribute("stroke", "#ffffff");
            path.setAttribute("stroke-width", "1.2");
            path.setAttribute("fill", "none");
            
            const opacity = Math.random() * 0.4 + 0.3;
            path.style.strokeOpacity = opacity;
            
            svg.appendChild(path);
            heart.appendChild(svg);
            
            heartsContainer.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, duration * 1000 + 1000);
        }
        
        // Function to create rain of hand-drawn hearts
        function createHeartRain() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    createHandDrawnHeart();
                }, i * 80);
            }
            
            if (!window.heartRainInterval) {
                window.heartRainInterval = setInterval(() => {
                    if (gameState.firstYesClicked && gameState.noClicked) {
                        for (let i = 0; i < 8; i++) {
                            setTimeout(() => {
                                createHandDrawnHeart();
                            }, i * 100);
                        }
                    }
                }, 3000);
            }
        }
        
        // Function to make YES button grow
        function growYesButton() {
            gameState.yesGrowCount++;
            
            let currentSize = parseInt(window.getComputedStyle(yesBtn).fontSize);
            let currentPadding = parseInt(window.getComputedStyle(yesBtn).padding);
            
            yesBtn.style.fontSize = (currentSize * 1.15) + 'px';
            yesBtn.style.padding = (currentPadding * 1.15) + 'px ' + (currentPadding * 2.3) + 'px';
            yesBtn.classList.add('grown');
            
            // Check if YES now covers NO
            if (doesYesCoverNo() && !gameState.yesEnabled) {
                gameState.yesEnabled = true;
                console.log('YES button activated!');
                
                // Visual feedback that YES is now enabled
                yesBtn.style.boxShadow = '0 0 20px rgba(26, 26, 26, 0.5)';
            }
        }
        
        // Function for NO button to run away
        function runAwayNo() {
            const containerRect = buttonsContainer.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            const maxX = Math.max(0, containerRect.width - btnRect.width);
            const maxY = Math.max(0, containerRect.height - btnRect.height);
            
            let randomX = Math.random() * maxX;
            let randomY = Math.random() * maxY;
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.right = 'auto';
            noBtn.style.bottom = 'auto';
            
            growYesButton();
        }
        
        // Function to handle victory
        function handleVictory() {
            console.log('VICTORY!');
            
            questionText.style.opacity = '0';
            questionText.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                questionText.style.display = 'none';
            }, 600);
            
            mainImage.style.opacity = '0';
            setTimeout(() => {
                mainImage.src = 'photo2.jpg';
                mainImage.style.opacity = '0.95';
            }, 300);
            
            buttonsContainer.style.opacity = '0';
            buttonsContainer.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                buttonsContainer.style.display = 'none';
            }, 600);
            
            loveMessage.style.display = 'block';
            loveMessage.className = 'love-message';
            loveMessage.innerHTML = 'love you';
            
            createHeartRain();
            
            imageFrame.style.boxShadow = '0 0 40px rgba(255, 255, 255, 0.3), 0 20px 40px -10px rgba(0, 0, 0, 0.5)';
        }
        
        // YES button click handler
        yesBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            console.log('YES clicked, enabled:', gameState.yesEnabled, 'growCount:', gameState.yesGrowCount);
            
            if (!gameState.yesEnabled && gameState.yesGrowCount < 8) {
                // YES not ready yet
                console.log('YES not ready yet');
                return;
            }
            
            if (!gameState.firstYesClicked) {
                gameState.firstYesClicked = true;
                console.log('First YES clicked');
                
                yesBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    yesBtn.style.transform = 'scale(1)';
                }, 200);
            }
            
            if (gameState.firstYesClicked && gameState.noClicked) {
                handleVictory();
            }
        });
        
        // NO button click handler
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            console.log('NO clicked, state:', gameState);
            
            if (gameState.firstYesClicked) {
                gameState.noClicked = true;
                console.log('NO after YES clicked');
                
                noBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    noBtn.style.transform = 'scale(1)';
                }, 200);
            } else {
                console.log('NO running away');
                runAwayNo();
            }
        });
        
        // Hover for NO (desktop)
        noBtn.addEventListener('mouseenter', function(e) {
            if (!gameState.firstYesClicked) {
                runAwayNo();
            }
        });
        
        // Touch for NO (mobile)
        noBtn.addEventListener('touchstart', function(e) {
            if (!gameState.firstYesClicked) {
                e.preventDefault();
                runAwayNo();
            }
        });
        
        // Add initial subtle hearts
        window.addEventListener('load', function() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'hand-drawn-heart';
                    heart.style.width = '20px';
                    heart.style.height = '20px';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    
                    const svgNS = "http://www.w3.org/2000/svg";
                    const svg = document.createElementNS(svgNS, "svg");
                    svg.setAttribute("viewBox", "0 0 24 24");
                    
                    const path = document.createElementNS(svgNS, "path");
                    path.setAttribute("d", heartPath);
                    path.setAttribute("stroke", "#ffffff");
                    path.setAttribute("stroke-width", "1");
                    path.setAttribute("fill", "none");
                    path.style.strokeOpacity = '0.15';
                    
                    svg.appendChild(path);
                    heart.appendChild(svg);
                    
                    heartsContainer.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.remove();
                    }, 10000);
                }, i * 500);
            }
        });
    </script>
</body>
</html>
